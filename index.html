<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />
  
  <title>Frontend Mentor | Blog preview card</title>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <a href="#" class="card">
    <img src="assets/images/illustration-article.svg" alt="" class="card-image" />
    <div class="wrapper">
      <span class="tag">Learning</span>
      <div class="date">Published 21 Dec 2023</div>
      <h1 class="title">HTML & CSS foundations</h1>
      <p class="text">These languages are the backbone of every website, defining structure, content, and presentation.</p>
      <div class="author">
        <img src="assets/images/image-avatar.webp" alt="Greg Hooper" class="author-image" />
        <div class="name">Greg Hooper</div>
      </div>
    </div>
  </a>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/usignak">Usigna</a>.
  </footer>

</html>
